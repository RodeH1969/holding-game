<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HOLDING · Leaderboard</title>
<style>
  :root {
    --accent: #ff5757;
    --input-fill: #d5d5d5;
    --border: #000;
    --text: #111;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #fff;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px 16px 48px;
  }
  .card { width: 100%; max-width: 430px; }
  .logo {
    display: block;
    width: 65%;
    max-width: 230px;
    margin: 8px auto 12px;
  }
  h1 {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 20px;
  }
  .back-link {
    display: block;
    text-align: center;
    margin: -6px 0 20px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    border-bottom: 2px solid var(--text);
    padding-bottom: 2px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .code-form { display: flex; gap: 8px; margin-bottom: 20px; }
  .code-form input {
    flex: 1;
    padding: 14px 16px;
    background: var(--input-fill);
    border: 3px solid var(--border);
    border-radius: 14px;
    font-size: 1rem;
  }
  .code-form button {
    padding: 14px 18px;
    background: var(--accent);
    border: 3px solid var(--border);
    border-radius: 14px;
    color: #fff;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .game-label {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .game-label span { font-weight: 700; color: var(--text); }

  table {
    width: 100%;
    border-collapse: collapse;
    border: 3px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 14px;
    text-align: left;
    font-size: 0.95rem;
  }
  th {
    background: #111;
    color: #fff;
    text-transform: uppercase;
    font-size: 0.72rem;
    letter-spacing: 0.5px;
  }
  tbody tr:nth-child(even) { background: #f7f7f7; }
  tbody tr:not(:last-child) td { border-bottom: 1px solid #e5e5e5; }
  td.rank { font-weight: 800; width: 40px; }
  td.points { font-weight: 800; text-align: right; }
  td.holding { color: var(--muted); font-size: 0.85rem; }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 24px 10px;
    border: 3px solid var(--border);
    border-radius: 14px;
  }

  .claim-btn {
    display: block;
    width: 100%;
    padding: 16px;
    margin-bottom: 20px;
    background: #fff;
    color: var(--text);
    border: 3px solid #000;
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    cursor: pointer;
    animation: pulse-glow-red 1.8s ease-in-out infinite;
  }
  @keyframes pulse-glow-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(209, 0, 0, 0.45); }
    50% { box-shadow: 0 0 0 10px rgba(209, 0, 0, 0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .claim-btn { animation: none; }
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border: 5px solid #000;
    border-radius: 16px;
    max-width: 400px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #f0f0f0;
    border: 2px solid #000;
    color: #000;
    font-size: 1rem;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .modal-box h3 {
    font-size: 1.1rem;
    font-weight: 800;
    text-align: center;
    margin: 0 20px 16px;
    color: #d10000;
  }
  .modal-box p {
    font-size: 0.88rem;
    line-height: 1.5;
    color: #d10000;
    margin: 0 0 16px;
    text-align: center;
    font-weight: 700;
  }
  .modal-box p:last-child { margin-bottom: 0; }
  .modal-box strong { font-weight: 800; }
  .pulse-leader {
    display: inline-block;
    animation: pulse-text-red 1s ease-in-out infinite;
  }
  @keyframes pulse-text-red {
    0%, 100% { color: #d10000; transform: scale(1); }
    50% { color: #ff0000; transform: scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce) {
    .pulse-leader { animation: none; }
  }

  .ticker {
    overflow: hidden;
    white-space: nowrap;
    background: #ff2fa0;
    border: 3px solid #ff2fa0;
    border-radius: 8px;
    padding: 8px 0;
    margin-bottom: 20px;
  }
  .ticker-track {
    display: inline-flex;
    animation: ticker-scroll 14s linear infinite;
    color: #fff;
    font-weight: 800;
    font-size: 0.82rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .ticker-track span {
    padding-right: 40px;
    white-space: nowrap;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ticker-track { animation: none; }
  }

  .section-title {
    font-size: 0.95rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 24px 0 10px;
  }
  .section-title:first-of-type { margin-top: 0; }
  td.quarter { font-weight: 800; width: 60px; }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/holding_logo.png" alt="HOLDING">
    <h1>Leaderboard</h1>
    <a class="back-link" href="/index.html">← Back to entry</a>

    <div class="ticker">
      <div class="ticker-track">
        <span>Prizes brought to you by Black Sheep Bottleo The Gap</span>
        <span>Prizes brought to you by Black Sheep Bottleo The Gap</span>
      </div>
    </div>

    <button type="button" class="claim-btn" id="claimBtn">How to Claim Prizes</button>

    <form class="code-form" id="codeForm">
      <input type="text" id="gameCodeInput" placeholder="Game code" autocomplete="off" required>
      <button type="submit">View</button>
    </form>

    <div class="game-label" id="gameLabel"></div>

    <div class="section-title">Quarter Leaders</div>
    <div id="quarterWrap"></div>

    <div class="section-title">Total Points</div>
    <div id="boardWrap"></div>
  </div>

  <div class="modal-overlay" id="claimModal">
    <div class="modal-box">
      <button class="modal-close" type="button" data-close="claimModal">✕</button>
      <h3>How to Claim Prizes</h3>
      <p>Prize 1<br>Text <strong class="pulse-leader">"LEADER"</strong><br>to Game Master 0459 754 708</p>
      <p>Prize 2<br>Text <strong>"WINNER"</strong><br>to Game Master 0459 754 708</p>
    </div>
  </div>

<script>
  const codeForm = document.getElementById('codeForm');
  const gameCodeInput = document.getElementById('gameCodeInput');
  const gameLabel = document.getElementById('gameLabel');
  const boardWrap = document.getElementById('boardWrap');
  const quarterWrap = document.getElementById('quarterWrap');

  let currentCode = '';

  async function loadQuarterLeaders(code) {
    quarterWrap.innerHTML = '<div class="empty-state">Loading...</div>';
    try {
      const res = await fetch(`/api/quarter-leaders/${encodeURIComponent(code)}`);
      const data = await res.json();

      if (!res.ok) {
        quarterWrap.innerHTML = '<div class="empty-state">Could not load quarter leaders.</div>';
        return;
      }

      const byQuarter = {};
      data.forEach(row => { byQuarter[row.quarter] = row; });

      const rows = [1, 2, 3, 4].map(q => {
        const row = byQuarter[q];
        return `
          <tr>
            <td class="quarter">Q${q}</td>
            <td>${row ? row.handle : '—'}</td>
            <td class="holding">${row && row.holding_player ? row.holding_player : (row ? '' : 'Not posted yet')}</td>
          </tr>
        `;
      }).join('');

      quarterWrap.innerHTML = `
        <table>
          <thead><tr><th>Qtr</th><th>Leader</th><th>Holding</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (err) {
      quarterWrap.innerHTML = '<div class="empty-state">Network error. Try again.</div>';
    }
  }

  async function loadLeaderboard(code) {
    currentCode = code.toUpperCase();
    gameLabel.innerHTML = `Standings for <span>${currentCode}</span>`;
    boardWrap.innerHTML = '<div class="empty-state">Loading...</div>';

    loadQuarterLeaders(currentCode);

    try {
      const res = await fetch(`/api/leaderboard/${encodeURIComponent(currentCode)}`);
      const data = await res.json();

      if (!res.ok) {
        boardWrap.innerHTML = '<div class="empty-state">Could not load leaderboard.</div>';
        return;
      }
      if (!data.length) {
        boardWrap.innerHTML = '<div class="empty-state">No results posted yet — check back after the first quarter.</div>';
        return;
      }

      const rows = data.map((row, i) => `
        <tr>
          <td class="rank">${i + 1}</td>
          <td>${row.handle}</td>
          <td class="holding">${row.holding_player || '—'}</td>
          <td class="points">${row.points}</td>
        </tr>
      `).join('');

      boardWrap.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Handle</th><th>Holding</th><th>Points</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (err) {
      boardWrap.innerHTML = '<div class="empty-state">Network error. Try again.</div>';
    }
  }

  codeForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const code = gameCodeInput.value.trim();
    if (code) loadLeaderboard(code);
  });

  // Auto-load from ?code=XYZ if present
  const params = new URLSearchParams(window.location.search);
  const initialCode = params.get('code');
  if (initialCode) {
    gameCodeInput.value = initialCode;
    loadLeaderboard(initialCode);
  }

  // Refresh every 15s so results appear live as the Games Master posts them
  setInterval(() => {
    if (currentCode) loadLeaderboard(currentCode);
  }, 15000);

  // ---- Claim popup ----
  function openModal(id) {
    document.getElementById(id).classList.add('show');
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
  }
  document.getElementById('claimBtn').addEventListener('click', () => openModal('claimModal'));
  document.querySelectorAll('.modal-close').forEach(btn => {
    btn.addEventListener('click', () => closeModal(btn.dataset.close));
  });
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });
</script>
</body>
</html>
