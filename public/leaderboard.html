<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HOLDING · Leaderboard</title>
<style>
  :root {
    --accent: #ff5757;
    --input-fill: #d5d5d5;
    --border: #000;
    --text: #111;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: #fff;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px 16px 48px;
  }
  .card { width: 100%; max-width: 430px; }
  .logo {
    display: block;
    width: 65%;
    max-width: 230px;
    margin: 8px auto 12px;
  }
  h1 {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 20px;
  }
  .back-link {
    display: block;
    text-align: center;
    margin: -6px 0 20px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    border-bottom: 2px solid var(--text);
    padding-bottom: 2px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .code-form { display: flex; gap: 8px; margin-bottom: 20px; }
  .code-form input {
    flex: 1;
    padding: 14px 16px;
    background: var(--input-fill);
    border: 3px solid var(--border);
    border-radius: 14px;
    font-size: 1rem;
  }
  .code-form button {
    padding: 14px 18px;
    background: var(--accent);
    border: 3px solid var(--border);
    border-radius: 14px;
    color: #fff;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .game-label {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .game-label span { font-weight: 700; color: var(--text); }

  table {
    width: 100%;
    border-collapse: collapse;
    border: 3px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 14px;
    text-align: left;
    font-size: 0.95rem;
  }
  th {
    background: #111;
    color: #fff;
    text-transform: uppercase;
    font-size: 0.72rem;
    letter-spacing: 0.5px;
  }
  tbody tr:nth-child(even) { background: #f7f7f7; }
  tbody tr:not(:last-child) td { border-bottom: 1px solid #e5e5e5; }
  td.rank { font-weight: 800; width: 40px; }
  td.points { font-weight: 800; text-align: right; }
  td.holding { color: var(--muted); font-size: 0.85rem; }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 24px 10px;
    border: 3px solid var(--border);
    border-radius: 14px;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/holding_logo.png" alt="HOLDING">
    <h1>Leaderboard</h1>
    <a class="back-link" href="/index.html">← Back to entry</a>

    <form class="code-form" id="codeForm">
      <input type="text" id="gameCodeInput" placeholder="Game code" autocomplete="off" required>
      <button type="submit">View</button>
    </form>

    
    <div style="border:3px solid #000;border-radius:14px;padding:16px;margin:0 0 20px;text-align:center;background:#fff7f7;">
      <div style="font-weight:800;font-size:1.1rem;margin-bottom:10px;">PRIZE CLAIMS</div>
      <div><strong>Prize 1</strong><br>Text "<strong>LEADER</strong>"<br>to Game Master<br><strong>0459 754 708</strong></div>
      <hr>
      <div><strong>Prize 2</strong><br>Text "<strong>WINNER</strong>"<br>to Game Master<br><strong>0459 754 708</strong></div>
    </div>

    <div class="game-label" id="gameLabel"></div>
    <div id="boardWrap"></div>
  </div>

<script>
  const codeForm = document.getElementById('codeForm');
  const gameCodeInput = document.getElementById('gameCodeInput');
  const gameLabel = document.getElementById('gameLabel');
  const boardWrap = document.getElementById('boardWrap');

  let currentCode = '';

  async function loadLeaderboard(code) {
    currentCode = code.toUpperCase();
    gameLabel.innerHTML = `Standings for <span>${currentCode}</span>`;
    boardWrap.innerHTML = '<div class="empty-state">Loading...</div>';

    try {
      const res = await fetch(`/api/leaderboard/${encodeURIComponent(currentCode)}`);
      const data = await res.json();

      if (!res.ok) {
        boardWrap.innerHTML = '<div class="empty-state">Could not load leaderboard.</div>';
        return;
      }
      if (!data.length) {
        boardWrap.innerHTML = '<div class="empty-state">No results posted yet — check back after the first quarter.</div>';
        return;
      }

      const rows = data.map((row, i) => `
        <tr>
          <td class="rank">${i + 1}</td>
          <td>${row.handle}</td>
          <td class="holding">${row.holding_player || '—'}</td>
          <td class="points">${row.points}</td>
        </tr>
      `).join('');

      boardWrap.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Handle</th><th>Holding</th><th>Points</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (err) {
      boardWrap.innerHTML = '<div class="empty-state">Network error. Try again.</div>';
    }
  }

  codeForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const code = gameCodeInput.value.trim();
    if (code) loadLeaderboard(code);
  });

  // Auto-load from ?code=XYZ if present
  const params = new URLSearchParams(window.location.search);
  const initialCode = params.get('code');
  if (initialCode) {
    gameCodeInput.value = initialCode;
    loadLeaderboard(initialCode);
  }

  // Refresh every 15s so results appear live as the Games Master posts them
  setInterval(() => {
    if (currentCode) loadLeaderboard(currentCode);
  }, 15000);
</script>
</body>
</html>
