<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLDING Admin</title>
<style>
  :root {
    --bg: #111111;
    --panel: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e94560;
    --text: #eaeaea;
    --muted: #8a8a8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    padding: 40px 20px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 {
    color: var(--accent);
    font-size: 1.8rem;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
  }
  select {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
  }
  button {
    padding: 12px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button:hover { filter: brightness(1.08); }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 24px;
  }
  th, td {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  th { color: var(--muted); text-transform: uppercase; font-size: 0.75rem; }
  .row-actions button { padding: 6px 12px; font-size: 0.8rem; margin-right: 6px; }
  .row-actions .stop-btn { background: #444; }
  #status { color: var(--muted); margin-top: 10px; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge.open { background: #1f4d2e; color: #7de89a; }
  .badge.closed { background: #4d1f1f; color: #ff9a9a; }

  .lb-section {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .lb-section h2 {
    font-size: 1.2rem;
    margin-bottom: 16px;
  }
  .lb-form {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .lb-form > div { flex: 1; min-width: 120px; }
  .lb-form label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .lb-form input { margin-bottom: 0; }
  .lb-form button { height: 46px; }
  .row-actions .del-btn { background: #4d1f1f; }
  .no-leader-check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 16px;
    cursor: pointer;
  }
  .no-leader-check input { width: auto; margin: 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>HOLDING · Admin</h1>

  <div id="loginBox">
    <input type="password" id="pw" placeholder="Admin password">
    <button id="loginBtn">Load games</button>
  </div>

  <div id="status"></div>

  <div id="content" style="display:none;">
    <button id="downloadAll">Download ALL entries (.xlsx)</button>
    <table id="gamesTable">
      <thead>
        <tr><th>Game code</th><th>Entries given out</th><th>Status</th><th></th></tr>
      </thead>
      <tbody id="gamesBody"></tbody>
    </table>

    <div class="lb-section">
      <h2>Leaderboard</h2>
      <div class="lb-form">
        <div>
          <label>Game code</label>
          <input type="text" id="lbGameCode" placeholder="e.g. FREOVSWANSR18">
        </div>
        <button id="lbLoadBtn">Load</button>
      </div>

      <div class="lb-form">
        <div>
          <label>Handle</label>
          <input type="text" id="lbHandle" placeholder="Handle">
        </div>
        <div>
          <label>Points to Add</label>
          <input type="number" id="lbPoints" placeholder="0" value="0">
        </div>
        <div>
          <label>Player Holding Ball</label>
          <input type="text" id="lbHoldingPlayer" placeholder="e.g. 4 B. Grundy">
        </div>
        <button id="lbSaveBtn">Save</button>
      </div>

      <table id="lbTable" style="display:none;">
        <thead>
          <tr><th>Handle</th><th>Points</th><th>Holding</th><th></th></tr>
        </thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>

    <div class="lb-section">
      <h2>Quarter Winners</h2>
      <div class="lb-form">
        <div>
          <label>Game code</label>
          <input type="text" id="qlGameCode" placeholder="e.g. FREOVSWANSR18">
        </div>
        <button id="qlLoadBtn">Load</button>
      </div>

      <div class="lb-form">
        <div>
          <label>Quarter</label>
          <select id="qlQuarter">
            <option value="1">Quarter 1</option>
            <option value="2">Quarter 2</option>
            <option value="3">Quarter 3</option>
            <option value="4">Quarter 4</option>
          </select>
        </div>
        <div>
          <label>Handle</label>
          <input type="text" id="qlHandle" placeholder="Handle">
        </div>
        <div>
          <label>Player Holding Ball</label>
          <input type="text" id="qlHoldingPlayer" placeholder="e.g. 4 B. Grundy">
        </div>
        <button id="qlSaveBtn">Save</button>
      </div>

      <label class="no-leader-check">
        <input type="checkbox" id="qlNoLeader">
        No winner this quarter (nobody held the ball at the mark)
      </label>

      <table id="qlTable" style="display:none;">
        <thead>
          <tr><th>Quarter</th><th>Winner</th><th>Holding</th><th></th></tr>
        </thead>
        <tbody id="qlBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const pwInput = document.getElementById('pw');
  const statusEl = document.getElementById('status');
  const content = document.getElementById('content');
  const gamesBody = document.getElementById('gamesBody');
  let currentPw = '';

  document.getElementById('loginBtn').addEventListener('click', loadGames);
  document.getElementById('downloadAll').addEventListener('click', () => download('ALL'));

  async function loadGames() {
    currentPw = pwInput.value;
    statusEl.textContent = 'Loading...';
    try {
      const res = await fetch(`/admin/games?pw=${encodeURIComponent(currentPw)}`);
      if (!res.ok) {
        statusEl.textContent = 'Wrong password.';
        content.style.display = 'none';
        return;
      }
      const games = await res.json();
      statusEl.textContent = '';
      content.style.display = 'block';
      gamesBody.innerHTML = games.map(g => `
        <tr>
          <td>${g.game_code}</td>
          <td>${g.current_index}</td>
          <td><span class="badge ${g.status}">${g.status}</span></td>
          <td class="row-actions">
            <button onclick="download('${g.game_code}')">Download</button>
            ${g.status === 'open'
              ? `<button class="stop-btn" onclick="setStatus('${g.game_code}', 'closed')">Stop Entries</button>`
              : `<button onclick="setStatus('${g.game_code}', 'open')">Reopen</button>`}
            <button onclick="selectForLeaderboard('${g.game_code}')">Leaderboard</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="4">No games yet.</td></tr>';
    } catch (err) {
      statusEl.textContent = 'Network error.';
    }
  }

  function download(gameCode) {
    const url = `/admin/export.xlsx?game_code=${encodeURIComponent(gameCode)}&pw=${encodeURIComponent(currentPw)}`;
    window.location.href = url;
  }

  async function setStatus(gameCode, status) {
    try {
      const res = await fetch(`/admin/games/${encodeURIComponent(gameCode)}/status?pw=${encodeURIComponent(currentPw)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (!res.ok) {
        alert('Could not update status.');
        return;
      }
      loadGames();
    } catch (err) {
      alert('Network error.');
    }
  }

  // ---------------- Leaderboard ----------------
  const lbGameCodeInput = document.getElementById('lbGameCode');
  const lbHandleInput = document.getElementById('lbHandle');
  const lbPointsInput = document.getElementById('lbPoints');
  const lbHoldingPlayerInput = document.getElementById('lbHoldingPlayer');
  const lbTable = document.getElementById('lbTable');
  const lbBody = document.getElementById('lbBody');

  document.getElementById('lbLoadBtn').addEventListener('click', () => {
    const code = lbGameCodeInput.value.trim();
    if (code) loadLeaderboard(code);
  });
  document.getElementById('lbSaveBtn').addEventListener('click', saveLeaderboardEntry);

  function selectForLeaderboard(gameCode) {
    lbGameCodeInput.value = gameCode;
    loadLeaderboard(gameCode);
    qlGameCodeInput.value = gameCode;
    loadQuarterLeaders(gameCode);
    document.querySelector('.lb-section').scrollIntoView({ behavior: 'smooth' });
  }

  async function loadLeaderboard(gameCode) {
    try {
      const res = await fetch(`/admin/leaderboard/${encodeURIComponent(gameCode)}?pw=${encodeURIComponent(currentPw)}`);
      if (!res.ok) {
        alert('Could not load leaderboard.');
        return;
      }
      const entries = await res.json();
      lbTable.style.display = entries.length ? 'table' : 'none';
      lbBody.innerHTML = entries.map(e => `
        <tr>
          <td>${e.handle}</td>
          <td>${e.points}</td>
          <td>${e.holding_player || ''}</td>
          <td class="row-actions">
            <button class="del-btn" onclick="deleteLeaderboardEntry('${lbGameCodeInput.value.trim()}', '${e.handle}')">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      alert('Network error.');
    }
  }

  async function saveLeaderboardEntry() {
    const gameCode = lbGameCodeInput.value.trim();
    const handle = lbHandleInput.value.trim();
    const points = lbPointsInput.value;
    const holdingPlayer = lbHoldingPlayerInput.value.trim();

    if (!gameCode || !handle) {
      alert('Enter a game code and handle.');
      return;
    }

    try {
      const res = await fetch(`/admin/leaderboard?pw=${encodeURIComponent(currentPw)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_code: gameCode, handle, points, holding_player: holdingPlayer })
      });
      if (!res.ok) {
        alert('Could not save entry.');
        return;
      }
      lbHandleInput.value = '';
      lbPointsInput.value = '0';
      lbHoldingPlayerInput.value = '';
      loadLeaderboard(gameCode);
    } catch (err) {
      alert('Network error.');
    }
  }

  async function deleteLeaderboardEntry(gameCode, handle) {
    try {
      const res = await fetch(`/admin/leaderboard/${encodeURIComponent(gameCode)}/${encodeURIComponent(handle)}?pw=${encodeURIComponent(currentPw)}`, {
        method: 'DELETE'
      });
      if (!res.ok) {
        alert('Could not delete entry.');
        return;
      }
      loadLeaderboard(gameCode);
    } catch (err) {
      alert('Network error.');
    }
  }

  // ---------------- Quarter Leaders ----------------
  const qlGameCodeInput = document.getElementById('qlGameCode');
  const qlQuarterInput = document.getElementById('qlQuarter');
  const qlHandleInput = document.getElementById('qlHandle');
  const qlHoldingPlayerInput = document.getElementById('qlHoldingPlayer');
  const qlNoLeaderInput = document.getElementById('qlNoLeader');
  const qlTable = document.getElementById('qlTable');
  const qlBody = document.getElementById('qlBody');

  document.getElementById('qlLoadBtn').addEventListener('click', () => {
    const code = qlGameCodeInput.value.trim();
    if (code) loadQuarterLeaders(code);
  });
  document.getElementById('qlSaveBtn').addEventListener('click', saveQuarterLeader);

  qlNoLeaderInput.addEventListener('change', () => {
    const disabled = qlNoLeaderInput.checked;
    qlHandleInput.disabled = disabled;
    qlHoldingPlayerInput.disabled = disabled;
    if (disabled) {
      qlHandleInput.value = '';
      qlHoldingPlayerInput.value = '';
    }
  });

  async function loadQuarterLeaders(gameCode) {
    try {
      const res = await fetch(`/api/quarter-leaders/${encodeURIComponent(gameCode)}`);
      if (!res.ok) {
        alert('Could not load quarter winners.');
        return;
      }
      const entries = await res.json();
      qlTable.style.display = entries.length ? 'table' : 'none';
      qlBody.innerHTML = entries.map(e => `
        <tr>
          <td>Q${e.quarter}</td>
          <td>${e.handle || 'No winner'}</td>
          <td>${e.holding_player || ''}</td>
          <td class="row-actions">
            <button class="del-btn" onclick="deleteQuarterLeader('${qlGameCodeInput.value.trim()}', ${e.quarter})">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      alert('Network error.');
    }
  }

  async function saveQuarterLeader() {
    const gameCode = qlGameCodeInput.value.trim();
    const quarter = qlQuarterInput.value;
    const noLeader = qlNoLeaderInput.checked;
    const handle = qlHandleInput.value.trim();
    const holdingPlayer = qlHoldingPlayerInput.value.trim();

    if (!gameCode) {
      alert('Enter a game code.');
      return;
    }
    if (!noLeader && !handle) {
      alert('Enter a handle, or tick "No winner this quarter".');
      return;
    }

    const summary = noLeader ? 'No winner (nobody held the ball)' : `"${handle}"`;
    const confirmed = confirm(`Save Quarter ${quarter} winner as ${summary} for ${gameCode}?`);
    if (!confirmed) return;

    try {
      const res = await fetch(`/admin/quarter-leaders?pw=${encodeURIComponent(currentPw)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_code: gameCode, quarter, handle, holding_player: holdingPlayer, no_leader: noLeader })
      });
      if (!res.ok) {
        alert('Could not save quarter winner.');
        return;
      }
      qlHandleInput.value = '';
      qlHoldingPlayerInput.value = '';
      qlNoLeaderInput.checked = false;
      qlHandleInput.disabled = false;
      qlHoldingPlayerInput.disabled = false;
      loadQuarterLeaders(gameCode);
    } catch (err) {
      alert('Network error.');
    }
  }

  async function deleteQuarterLeader(gameCode, quarter) {
    try {
      const res = await fetch(`/admin/quarter-leaders/${encodeURIComponent(gameCode)}/${quarter}?pw=${encodeURIComponent(currentPw)}`, {
        method: 'DELETE'
      });
      if (!res.ok) {
        alert('Could not delete quarter winner.');
        return;
      }
      loadQuarterLeaders(gameCode);
    } catch (err) {
      alert('Network error.');
    }
  }
</script>
</body>
</html>
